name: Build and Release CV

on:
  push:
    branches: [master]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install TeX Live
        uses: zauguin/install-texlive@v4
        with:
          packages: >
            scheme-basic
            xetex
            latexmk
            fontspec
            xunicode
            xltxtra
            realscripts
            metalogo
            marvosym
            pgf
            xcolor
            url
            parskip
            supertabular
            titlesec
            hyperref
            textpos
            geometry
            enumitem
            tools
            tipa
            greek-fontenc
            graphics
            graphics-def
            graphics-cfg
            etoolbox
            kvoptions
            kvsetkeys
            kvdefinekeys
            pdfescape
            pdftexcmds
            infwarerr
            hycolor
            refcount
            gettitlestring
            stringenc
            intcalc
            bitset
            bigintcalc
            uniquecounter
            rerunfilecheck
            ltxcmds
            iftex

      - name: Ensure font utilities
        run: sudo apt-get update && sudo apt-get install -y fontconfig

      - name: Install fonts
        run: |
          mkdir -p ~/.local/share/fonts
          cp *.otf ~/.local/share/fonts/
          fc-cache -fv

      - name: Compile CV
        run: latexmk -xelatex -interaction=nonstopmode cv.tex

      - name: Generate tag
        id: tag
        run: echo "tag=v$(date +'%Y%m%d-%H%M%S')" >> "$GITHUB_OUTPUT"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: CV ${{ steps.tag.outputs.tag }}
          files: cv.pdf
